<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디자인 리서치</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #333;
      width: 300px;
      background: #fff;
    }

    .screen {
      padding: 16px;
      display: none;
    }

    .screen.active {
      display: block;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #111;
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #555;
      margin-bottom: 4px;
    }

    input[type="text"],
    select {
      width: 100%;
      height: 32px;
      padding: 0 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #333;
      background: #fff;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    input[type="text"]:focus,
    select:focus {
      border-color: #18a0fb;
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #888;
      font-size: 10px;
    }

    button {
      width: 100%;
      height: 32px;
      border: none;
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
    }

    .btn-primary {
      background: #18a0fb;
      color: #fff;
    }

    .btn-primary:hover {
      background: #0d8de3;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    /* 결과 화면 */
    .result-info {
      font-size: 11px;
      color: #666;
      margin-bottom: 12px;
    }

    .result-info span {
      font-weight: 600;
      color: #111;
    }

    .thumbnail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 12px;
      max-height: 240px;
      overflow-y: auto;
    }

    .thumbnail-item {
      aspect-ratio: 9 / 16;
      background: #f0f0f0;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      position: relative;
    }

    .thumbnail-item.selected {
      border-color: #18a0fb;
    }

    .thumbnail-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumbnail-item .check {
      display: none;
      position: absolute;
      top: 4px;
      right: 4px;
      width: 16px;
      height: 16px;
      background: #18a0fb;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 10px;
    }

    .thumbnail-item.selected .check {
      display: flex;
    }

    /* 완료 화면 */
    .complete-message {
      text-align: center;
      padding: 24px 0;
    }

    .complete-message .icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .complete-message p {
      font-size: 13px;
      font-weight: 500;
      color: #111;
      margin-bottom: 4px;
    }

    .complete-message small {
      font-size: 11px;
      color: #888;
    }

    .divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 12px 0;
    }

    .btn-google {
      width: 100%;
      height: 32px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0;
      margin-bottom: 8px;
      background: #fff;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-google:hover {
      background: #f8f8f8;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .empty-message {
      text-align: center;
      font-size: 12px;
      color: #888;
      padding: 24px 0;
    }
  </style>
</head>
<body>

  <!-- 검색 화면 -->
  <div id="screen-search" class="screen active">
    <h2>디자인 리서치</h2>

    <div class="field">
      <label for="app-name">앱 이름</label>
      <input type="text" id="app-name" placeholder="예: 토스, 카카오뱅크" />
    </div>

    <div class="field">
      <label for="ui-pattern">UI 패턴</label>
      <div class="select-wrapper">
        <select id="ui-pattern">
          <option value="">전체</option>
          <option value="AI">AI</option>
          <option value="검색">검색</option>
          <option value="게이미피케이션/퀴즈">게이미피케이션/퀴즈</option>
          <option value="카드/계좌">카드/계좌</option>
          <option value="공지사항">공지사항</option>
          <option value="글쓰기">글쓰기</option>
          <option value="내역/조회">내역/조회</option>
          <option value="내주변/지도">내주변/지도</option>
          <option value="녹음하기">녹음하기</option>
          <option value="로그인/회원가입">로그인/회원가입</option>
          <option value="리뷰">리뷰</option>
          <option value="리뷰쓰기">리뷰쓰기</option>
          <option value="리스트">리스트</option>
          <option value="마이페이지">마이페이지</option>
          <option value="메뉴/전체보기">메뉴/전체보기</option>
          <option value="멤버십">멤버십</option>
          <option value="문의/고객센터/FAQ">문의/고객센터/FAQ</option>
          <option value="북마크/위시리스트">북마크/위시리스트</option>
          <option value="사진촬영">사진촬영</option>
          <option value="상세정보">상세정보</option>
          <option value="선물하기">선물하기</option>
          <option value="설정/제어">설정/제어</option>
          <option value="스플래시">스플래시</option>
          <option value="신청/결정">신청/결정</option>
          <option value="알림/푸시">알림/푸시</option>
          <option value="예약/결제">예약/결제</option>
          <option value="음성">음성</option>
          <option value="이벤트">이벤트</option>
          <option value="장바구니">장바구니</option>
          <option value="채팅">채팅</option>
          <option value="챗봇">챗봇</option>
          <option value="초대하기/받기">초대하기/받기</option>
          <option value="추천/메인">추천/메인</option>
          <option value="취소/환불">취소/환불</option>
          <option value="커뮤니티">커뮤니티</option>
          <option value="포인트/쿠폰혜택">포인트/쿠폰혜택</option>
          <option value="통계/리포트">통계/리포트</option>
          <option value="튜토리얼/온보딩">튜토리얼/온보딩</option>
          <option value="필터">필터</option>
          <option value="에러/빈화면">에러/빈화면</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="category">카테고리</label>
      <div class="select-wrapper">
        <select id="category">
          <option value="">전체</option>
          <option value="health-fitness">health-fitness</option>
          <option value="finance">finance</option>
          <option value="commerce">commerce</option>
          <option value="lifestyle">lifestyle</option>
          <option value="entertainment">entertainment</option>
          <option value="social">social</option>
          <option value="productivity">productivity</option>
          <option value="education">education</option>
          <option value="utility">utility</option>
          <option value="sports">sports</option>
          <option value="music">music</option>
          <option value="navigation">navigation</option>
          <option value="photo-video">photo-video</option>
          <option value="business">business</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="collect-month">수집 월</label>
      <div class="select-wrapper">
        <select id="collect-month">
          <option value="">전체</option>
        </select>
      </div>
    </div>

    <button class="btn-google" id="btn-google">
      <svg width="14" height="14" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Google 로그인
    </button>

    <div class="field">
      <label for="token-input">로그인 후 토큰을 붙여넣어 주세요.</label>
      <input type="text" id="token-input" placeholder="토큰을 여기에 붙여넣어 주세요" />
    </div>

    <button class="btn-primary" id="btn-search" disabled>검색</button>
  </div>

  <!-- 결과 화면 -->
  <div id="screen-result" class="screen">
    <h2>검색 결과</h2>
    <p class="result-info">총 <span id="result-count">0</span>개의 결과</p>
    <div class="thumbnail-grid" id="thumbnail-grid"></div>
    <hr class="divider" />
    <button class="btn-primary" id="btn-insert">캔버스에 삽입</button>
    <button class="btn-secondary" id="btn-back-search" style="margin-top: 6px;">다시 검색</button>
  </div>

  <!-- 완료 화면 -->
  <div id="screen-complete" class="screen">
    <div class="complete-message">
      <div class="icon">✅</div>
      <p>캔버스에 삽입 완료!</p>
      <small>선택한 스크린샷이 Figma 캔버스에 추가되었습니다.</small>
    </div>
    <hr class="divider" />
    <button class="btn-primary" id="btn-restart">다시 검색</button>
  </div>

  <script>
    const CLIENT_ID = '909373433392-pp7lru6b2012k9qj99et9cr1pqnn16a9.apps.googleusercontent.com';
    const REDIRECT_URI = 'https://go-eun.github.io/design-research-oauth/oauth-callback.html';
    const FOLDER_ID = '17b9qKIbvJvDzqgp_Ww696t2rIjg-0X1Y';

    let accessToken = null;

    // 화면 전환
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // 수집 월 옵션 동적 생성 (최근 12개월)
    (function populateMonths() {
      const select = document.getElementById('collect-month');
      const now = new Date();
      for (let i = 0; i < 12; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const value = `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}`;
        const label = `${d.getFullYear()}년 ${d.getMonth() + 1}월`;
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = label;
        select.appendChild(opt);
      }
    })();

    // Google OAuth 로그인
    document.getElementById('btn-google').addEventListener('click', () => {
      const authUrl = new URL('https://accounts.google.com/o/oauth2/v2/auth');
      authUrl.searchParams.set('client_id', CLIENT_ID);
      authUrl.searchParams.set('redirect_uri', REDIRECT_URI);
      authUrl.searchParams.set('response_type', 'token');
      authUrl.searchParams.set('scope', 'https://www.googleapis.com/auth/drive.readonly');
      authUrl.searchParams.set('prompt', 'select_account');
      window.open(authUrl.toString(), 'google-oauth', 'width=500,height=600');
    });

    // 토큰 입력창 — 값이 있으면 검색 버튼 활성화
    document.getElementById('token-input').addEventListener('input', (e) => {
      const val = e.target.value.trim();
      accessToken = val || null;
      document.getElementById('btn-search').disabled = !accessToken;
    });

    function showSearchError(message) {
      const grid = document.getElementById('thumbnail-grid');
      grid.innerHTML = `<div class="empty-message" style="grid-column:1/-1;color:#e53935;">오류: ${message}</div>`;
      document.getElementById('result-count').textContent = '0';
      showScreen('screen-result');
    }

    // Drive API: 폴더 내 JSON 파일 목록 조회 (페이지네이션 포함)
    async function fetchAllJsonFiles() {
      const files = [];
      let pageToken = null;
      do {
        const params = new URLSearchParams({
          q: `'${FOLDER_ID}' in parents and mimeType='application/json' and trashed=false`,
          fields: 'nextPageToken,files(id,name)',
          pageSize: '1000',
        });
        if (pageToken) params.set('pageToken', pageToken);

        let res;
        try {
          res = await fetch(`https://www.googleapis.com/drive/v3/files?${params}`, {
            headers: { Authorization: `Bearer ${accessToken}` },
          });
        } catch (e) {
          throw new Error('파일 목록을 가져오지 못했어요: ' + e.message);
        }

        if (!res.ok) throw new Error(`Drive API 오류 (${res.status})`);

        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        if (data.files) files.push(...data.files);
        pageToken = data.nextPageToken || null;
      } while (pageToken);
      return files;
    }

    // Drive API: JSON 파일 내용 읽기
    async function fetchFileContent(fileId) {
      const res = await fetch(
        `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
        { headers: { Authorization: `Bearer ${accessToken}` } }
      );
      return res.json();
    }

    // Drive API: 파일명으로 PNG 파일 ID 조회
    async function findPngFileId(pngName) {
      const params = new URLSearchParams({
        q: `name='${pngName}' and '${FOLDER_ID}' in parents and trashed=false`,
        fields: 'files(id)',
        pageSize: '1',
      });
      const res = await fetch(`https://www.googleapis.com/drive/v3/files?${params}`, {
        headers: { Authorization: `Bearer ${accessToken}` },
      });
      const data = await res.json();
      return data.files && data.files.length > 0 ? data.files[0].id : null;
    }

    // 검색 버튼
    document.getElementById('btn-search').addEventListener('click', async () => {
      const appName = document.getElementById('app-name').value.trim().toLowerCase();
      const uiPattern = document.getElementById('ui-pattern').value;
      const category = document.getElementById('category').value;
      const collectMonth = document.getElementById('collect-month').value;

      const btnSearch = document.getElementById('btn-search');
      btnSearch.disabled = true;
      btnSearch.textContent = '검색 중...';

      try {
        let jsonFiles;
        try {
          jsonFiles = await fetchAllJsonFiles();
        } catch (e) {
          showSearchError(e.message);
          return;
        }

        const matched = [];

        for (const file of jsonFiles) {
          let meta;
          try {
            meta = await fetchFileContent(file.id);
          } catch (e) {
            continue;
          }

          const metaApp = (meta.app || '').toLowerCase();
          if (appName && !metaApp.includes(appName)) continue;
          if (uiPattern && !(Array.isArray(meta.ui_pattern) ? meta.ui_pattern.includes(uiPattern) : meta.ui_pattern === uiPattern)) continue;
          if (category && meta.category !== category) continue;
          if (collectMonth && meta.collected_month !== collectMonth) continue;

          const pngName = file.name.replace(/\.json$/i, '.png');
          let pngId;
          try {
            pngId = await findPngFileId(pngName);
          } catch (e) {
            pngId = null;
          }
          const thumbnail = pngId
            ? `https://drive.google.com/thumbnail?id=${pngId}&sz=w200`
            : null;

          matched.push({ id: file.id, appName: meta.app, thumbnail, pngId, meta });
        }

        const grid = document.getElementById('thumbnail-grid');
        grid.innerHTML = '';

        if (matched.length === 0) {
          grid.innerHTML = '<div class="empty-message" style="grid-column:1/-1">검색 결과가 없어요.</div>';
          document.getElementById('result-count').textContent = '0';
        } else {
          document.getElementById('result-count').textContent = matched.length;
          matched.forEach(item => {
            const div = document.createElement('div');
            div.className = 'thumbnail-item';
            div.dataset.id = item.id;
            div.dataset.pngId = item.pngId || '';
            div.innerHTML = item.thumbnail
              ? `<img src="${item.thumbnail}" alt="${item.appName}" />`
              : `<div style="width:100%;height:100%;background:#e0e0e0;"></div>`;
            div.innerHTML += `<div class="check">✓</div>`;
            grid.appendChild(div);
          });
        }

        showScreen('screen-result');
      } catch (e) {
        showSearchError(e.message);
      } finally {
        btnSearch.disabled = false;
        btnSearch.textContent = '검색';
      }
    });

    // 캔버스 삽입 버튼
    document.getElementById('btn-insert').addEventListener('click', () => {
      const selected = [...document.querySelectorAll('.thumbnail-item.selected')]
        .map(el => ({ id: el.dataset.id, pngId: el.dataset.pngId }));
      if (selected.length === 0) return;
      parent.postMessage({ pluginMessage: { type: 'insert', items: selected, accessToken } }, '*');
    });

    // 다시 검색 버튼들
    document.getElementById('btn-back-search').addEventListener('click', () => showScreen('screen-search'));
    document.getElementById('btn-restart').addEventListener('click', () => showScreen('screen-search'));

    // 썸네일 선택 토글
    document.getElementById('thumbnail-grid').addEventListener('click', (e) => {
      const item = e.target.closest('.thumbnail-item');
      if (item) item.classList.toggle('selected');
    });

    // code.js로부터 메시지 수신
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'insertComplete') {
        showScreen('screen-complete');
      }
    };
  </script>
</body>
</html>
