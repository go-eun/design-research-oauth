<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>로그인 처리 중...</title>
  <style>
    body {
      font-family: sans-serif;
      font-size: 14px;
      padding: 24px;
      color: #333;
    }
    #token-box {
      display: none;
    }
    p {
      margin-bottom: 12px;
    }
    textarea {
      width: 100%;
      height: 80px;
      font-size: 11px;
      font-family: monospace;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      resize: none;
      box-sizing: border-box;
      word-break: break-all;
    }
    button {
      margin-top: 8px;
      padding: 6px 16px;
      font-size: 13px;
      border: none;
      border-radius: 4px;
      background: #18a0fb;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background: #0d8de3;
    }
    #copy-confirm {
      font-size: 12px;
      color: #18a0fb;
      margin-left: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <p id="message">로그인 처리 중...</p>

  <div id="token-box">
    <p>아래 토큰을 복사해서 Figma 플러그인에 붙여넣어 주세요.</p>
    <textarea id="token-text" readonly></textarea>
    <br />
    <button id="btn-copy">복사</button>
    <span id="copy-confirm">복사됐어요!</span>
  </div>

  <script>
    try {
      const hash = window.location.hash;
      const match = hash.match(/access_token=([^&]+)/);
      const accessToken = match ? match[1] : null;

      if (!accessToken) throw new Error('access_token not found');

      document.getElementById('message').style.display = 'none';
      document.getElementById('token-text').value = accessToken;
      document.getElementById('token-box').style.display = 'block';

      document.getElementById('btn-copy').addEventListener('click', () => {
        navigator.clipboard.writeText(accessToken).then(() => {
          const confirm = document.getElementById('copy-confirm');
          confirm.style.display = 'inline';
          setTimeout(() => { confirm.style.display = 'none'; }, 2000);
        });
      });
    } catch (e) {
      document.getElementById('message').textContent = '오류가 발생했어요. 다시 시도해주세요.';
    }
  </script>
</body>
</html>
